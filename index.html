<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISS Live Camera Streams</title>
    <!-- Import Orbitron font (NASA-inspired) -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Star field background */
        body {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
            /* Star field effect */
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 160px 120px, #fff, transparent);
            background-repeat: repeat;
            background-size: 200px 200px;
            /* Animation for twinkling stars */
            animation: twinkle 5s linear infinite;
        }

        @keyframes twinkle {
            0% { background-position: 0 0; }
            100% { background-position: 200px 200px; }
        }

        h1 {
            text-align: center;
            text-shadow: 0 0 10px #4dabf7, 0 0 20px #4dabf7;
            color: #4dabf7;
            padding: 20px;
            font-size: 2.5em;
            letter-spacing: 2px;
        }

        .stream-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px auto;
            max-width: 1200px;
            padding: 20px;
        }

        .stream {
            border: 1px solid rgba(77, 171, 247, 0.5);
            padding: 10px;
            text-align: center;
            max-width: 640px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(77, 171, 247, 0.5);
        }

        .stream h2 {
            color: #4dabf7;
            margin-top: 0;
            text-shadow: 0 0 5px rgba(77, 171, 247, 0.8);
        }

        iframe {
            width: 100%;
            height: 360px;
            border: none;
            border-radius: 4px;
        }

        .fallback-message {
            color: #ff6b6b;
            font-family: Arial, sans-serif;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>LIVE STREAM FROM THE ISS</h1>
    <div class="stream-container" id="streamContainer">
        <!-- Streams will be added here dynamically -->
    </div>

    <script src="script.js"></script>
</body>
</html>
