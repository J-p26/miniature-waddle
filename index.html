<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISS Live Camera Streams</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
        }
        .stream-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .stream {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            max-width: 640px;
        }
        iframe {
            width: 100%;
            height: 360px;
            border: none;
        }
    </style>
</head>
<body>
    <h1>Live Streams from the International Space Station (ISS)</h1>
    <div class="stream-container" id="streamContainer">
        <!-- Streams will be added here dynamically -->
    </div>

    <script src="script.js"></script>
</body>
</html>
